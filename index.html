<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer'o</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: linear-gradient(135deg, #fff0f5, #e8e8e8);
            font-family: 'Comfortaa', sans-serif;
        }

        .app {
            background: rgba(255, 255, 255, 0.9);
            padding: 32px 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 4px solid #ffb3c6;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-size: 36px;
            color: #333;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px dashed #ffb3c6;
        }

        .section:first-of-type {
            margin-top: 16px;
            padding-top: 0;
            border-top: none;
        }

        .section h2, .section h3 {
            font-size: 18px;
            color: #555;
            margin-bottom: 12px;
            text-align: center;
        }

        #clock {
            font-size: 48px;
            color: #ff69b4;
            font-weight: 700;
            text-align: center;
            text-shadow: 3px 3px 6px rgba(255, 105, 180, 0.3);
        }

        #countdown {
            font-size: 36px;
            color: #ff69b4;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
        }

        .time-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #ffb3c6;
            color: #333;
            font-family: inherit;
            font-weight: 700;
            transition: background 0.2s;
        }

        button:hover {
            background: #ff69b4;
            color: #fff;
        }

        .task-box input {
            padding: 10px;
            width: calc(100% - 90px);
            border-radius: 10px;
            border: 2px solid #ffb3c6;
            font-family: inherit;
        }

        .task-row,
        .duration-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .duration-row label {
            font-size: 14px;
            color: #555;
        }

        .duration-row input[type="number"] {
            width: 48px;
            padding: 8px;
            border-radius: 10px;
            border: 2px solid #ffb3c6;
            font-family: inherit;
            text-align: center;
        }

        .duration-row input[type="number"]::-webkit-inner-spin-button {
            opacity: 1;
        }

        .duration-hint {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-bottom: 8px;
        }

        .task-box ul {
            list-style: none;
            margin-top: 10px;
            max-height: 160px;
            overflow-y: auto;
        }

        .task-box li {
            background: #ffe4ec;
            margin: 6px 0;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
        }

        .task-box li.done {
            text-decoration: line-through;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>Timer'o</h1>

        <div class="section">
            <h2>Current time</h2>
            <div id="clock">00:00:00 AM</div>
        </div>

        <div class="section time-controls-section">
            <h2>Study stopwatch</h2>
            <p class="duration-hint">Set hours, minutes &amp; seconds — pause before editing while running</p>
            <div class="duration-row">
                <label for="studyHours">Hr</label>
                <input type="number" id="studyHours" min="0" max="24" value="0" />
                <label for="studyMinutes">Min</label>
                <input type="number" id="studyMinutes" min="0" max="59" value="25" />
                <label for="studySeconds">Sec</label>
                <input type="number" id="studySeconds" min="0" max="59" value="0" />
                <button type="button" onclick="applyStudyTime()">Set time</button>
            </div>
            <div id="countdown">00:25:00</div>
            <div class="time-controls">
                <button type="button" onclick="startTimer()">▶ Start</button>
                <button type="button" onclick="pauseTimer()">⏸ Pause</button>
                <button type="button" onclick="resetTimer()">🔄 Reset</button>
            </div>
        </div>

        <div class="section task-box">
            <h3>🌸 My tasks</h3>
            <div class="task-row">
                <input type="text" id="taskInput" placeholder="Today's task..." />
                <button type="button" onclick="addTask()">➕ Add</button>
            </div>
            <ul id="taskList"></ul>
        </div>
    </div>

    <script>
        // —— Live clock ——
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            if (hours === 0) hours = 12;
            const h = String(hours).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // —— Study stopwatch (hours, minutes, seconds) ——
        const STUDY_TIME_KEY = 'timero-study-seconds';
        const MAX_STUDY_SECONDS = 24 * 60 * 60;
        let studyDuration = 25 * 60;
        let timeLeft = studyDuration;
        let timerId = null;

        function clampInput(id, min, max) {
            const el = document.getElementById(id);
            let n = parseInt(el.value, 10);
            if (isNaN(n) || n < min) n = min;
            if (n > max) n = max;
            el.value = n;
            return n;
        }

        function readStudyInputs() {
            const hours = clampInput('studyHours', 0, 24);
            const mins = clampInput('studyMinutes', 0, 59);
            const secs = clampInput('studySeconds', 0, 59);
            return hours * 3600 + mins * 60 + secs;
        }

        function syncStudyInputs(totalSeconds) {
            const hours = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            document.getElementById('studyHours').value = hours;
            document.getElementById('studyMinutes').value = mins;
            document.getElementById('studySeconds').value = secs;
        }

        function formatDuration(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function applyStudyTime() {
            if (timerId) {
                alert('Pause the stopwatch before changing the time.');
                return;
            }
            const total = readStudyInputs();
            if (total < 1) {
                alert('Set at least 1 second (e.g. 0 hr, 0 min, 1 sec).');
                return;
            }
            if (total > MAX_STUDY_SECONDS) {
                alert('Maximum stopwatch time is 24 hours.');
                return;
            }
            studyDuration = total;
            timeLeft = total;
            localStorage.setItem(STUDY_TIME_KEY, String(total));
            updateTimerDisplay();
        }

        function loadSavedStudyTime() {
            const saved = parseInt(localStorage.getItem(STUDY_TIME_KEY), 10);
            if (saved >= 1 && saved <= MAX_STUDY_SECONDS) {
                studyDuration = saved;
                timeLeft = saved;
                syncStudyInputs(saved);
            }
        }

        function updateTimerDisplay() {
            document.getElementById('countdown').textContent = formatDuration(timeLeft);
        }

        function startTimer() {
            if (timerId) return;
            if (timeLeft <= 0) timeLeft = studyDuration;
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    pauseTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = studyDuration;
            updateTimerDisplay();
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            const li = document.createElement('li');
            li.textContent = '🌸 ' + text;
            li.onclick = () => li.classList.toggle('done');

            document.getElementById('taskList').appendChild(li);
            input.value = '';
            input.focus();
        }

        document.getElementById('taskInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTask();
        });

        loadSavedStudyTime();
        updateTimerDisplay();
    </script>
</body>
</html>
